<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PickIQ — Recuperar contraseña</title>
  <style>
    body {
      background-color: #0D1117;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      text-align: center;
      padding: 40px 24px;
      max-width: 400px;
    }
    h1 { color: #00C851; font-size: 32px; margin-bottom: 8px; }
    p { color: #C0C0C0; font-size: 15px; line-height: 1.6; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #30363D;
      border-top: 4px solid #00C851;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 24px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <h1>PickIQ</h1>
    <div class="spinner"></div>
    <p>Abriendo la app para restablecer tu contraseña...</p>
    <p style="color:#555; font-size:13px; margin-top:24px;">
      Si la app no se abre automáticamente, 
      <a href="#" id="manualLink" style="color:#00C851;">toca aquí</a>
    </p>
  </div>

  <script>
    // Capturar token de la URL
    const params = new URLSearchParams(window.location.search);
    const hash = window.location.hash;
    
    let token = params.get('token') || 
                params.get('token_hash') || 
                new URLSearchParams(hash.substring(1)).get('access_token') || '';
    
    let type = params.get('type') || 'recovery';

    // Construir deep link
    const deepLink = `pickiq://reset-password?token=${token}&type=${type}`;
    
    // Actualizar link manual
    document.getElementById('manualLink').href = deepLink;
    
    // Redirigir automáticamente
    setTimeout(() => {
      window.location.href = deepLink;
    }, 1500);
  </script>
</body>
</html>
